name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file

      - name: Install JS deps
        run: npm ci

      - name: Ensure binaries/llama exists (placeholder for build)
        shell: bash
        run: mkdir -p src-tauri/binaries/llama && touch src-tauri/binaries/llama/.gitkeep

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalSheets ${{ github.ref_name }}"
          releaseBody: |
            ## LocalSheets ${{ github.ref_name }}

            Planilha offline com IA local (llama.cpp / GGUF).

            ### Downloads
            - **Windows — Instalador:** `*-setup.exe` (instala no sistema)
            - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)
            - **Linux — Debian/Ubuntu:** `*.deb`

            > **IA:** coloque seus modelos `.gguf` numa pasta, clique **+ IA**, escaneie e inicie.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}
